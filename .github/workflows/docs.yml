name: Docs

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs/**"
      - "main.nf"
      - "mkdocs.yml"
      - "modules/**"
      - "configs/**"
      - "nextflow.config"
      - "nextflow_schema.json"
      - "scripts/docs/**"
      - "tests/fixtures/simulate_trial_data.R"
      - "tests/fixtures/synthetic_trial_data/**"
      - "workflows/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docs.yml"
      - "README.md"
      - "docs/**"
      - "main.nf"
      - "mkdocs.yml"
      - "modules/**"
      - "configs/**"
      - "nextflow.config"
      - "nextflow_schema.json"
      - "scripts/docs/**"
      - "tests/fixtures/simulate_trial_data.R"
      - "tests/fixtures/synthetic_trial_data/**"
      - "workflows/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build and validate docs site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Nextflow
        run: |
          curl -fsSL https://get.nextflow.io | bash
          mkdir -p "$HOME/.local/bin"
          mv nextflow "$HOME/.local/bin/nextflow"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install docs tooling
        run: |
          pip install \
            certifi \
            mkdocs-material \
            pymdown-extensions \
            uv

      - name: Generate nf-docs API reference
        run: bash scripts/docs/generate_api_docs.sh

      - name: Generate synthetic example plots
        run: uvx --with matplotlib python scripts/docs/generate_example_plots.py

      - name: Debug docs tree
        run: ls -R docs/api

      - name: Build docs
        run: mkdocs build --strict

      - name: Deploy docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mkdocs gh-deploy --force --clean --remote-branch gh_pages
