name: Build and publish base image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/docker-publish.yml"
  schedule:
    # Rebuild monthly to pick up security patches
    - cron: "0 4 1 * *"
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: "Force rebuild even if the tag already exists"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value={{date 'YYYY-MM'}},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        if: github.event_name == 'pull_request'
        run: |
          # On PRs we build but don't push, so use the local image
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm "${IMAGE}" sh -c '
            set -e
            echo "=== Python ===" && python3 --version
            echo "=== uv ==="     && uv --version
            echo "=== R ==="      && R --version | head -n1
            echo "=== Rust ==="   && rustc --version && cargo --version
            echo "✅ All runtimes OK"
          '
