name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      run_container_smoke:
        description: "Prime cached module images and run container smoke checks"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_LABKEY_BASE_URL: https://labkey.example.org
  CI_LABKEY_FOLDER: /Example/Folder

jobs:
  lint_and_validate:
    name: Lint and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck HPC and CI helpers
        run: |
          set -e
          for f in slurm_nextflow.sh slurm_sync_repo.sh template/gw/run.sh template/gw/setup.sh template/gw/fetch_example_data.sh template/gw/check_workflows.sh template/cluster/run.sh scripts/*.sh scripts/ci/*.sh; do
            test -f "$f" || { echo "::error::Missing file: $f"; exit 1; }
          done
          shellcheck -S warning \
            slurm_nextflow.sh \
            slurm_sync_repo.sh \
            template/gw/run.sh \
            template/gw/setup.sh \
            template/gw/fetch_example_data.sh \
            template/gw/check_workflows.sh \
            template/cluster/run.sh \
            scripts/*.sh \
            scripts/ci/*.sh || {
              echo "::error::ShellCheck found issues in one or more scripts"
              exit 1
            }

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Nextflow runtime
        uses: actions/cache@v4
        with:
          path: |
            ~/.nextflow
            ~/.gradle/caches
          key: nextflow-${{ runner.os }}-${{ hashFiles('main.nf', 'nextflow.config', 'configs/*.config', 'workflows/*.nf', 'modules/local/**/*.nf') }}
          restore-keys: |
            nextflow-${{ runner.os }}-

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow
          nextflow -version

      - name: Workflow launcher parity
        run: bash scripts/ci/check_workflow_parity.sh

      - name: Validate Nextflow profiles & workflow syntax
        run: |
          nextflow config -profile test > /dev/null
          nextflow config -profile local > /dev/null
          # Stub-run validates all .nf files are syntactically correct (DSL2 scopes,
          # process blocks, etc.) without executing any containers. Catches errors
          # like invalid workflow scopes (e.g. onError:) before they hit smoke tests.
          echo "sample_id,species,url" > /tmp/test_samplesheet.csv
          echo "test,human,https://example.com/test.rds" >> /tmp/test_samplesheet.csv
          nextflow run main.nf -stub-run -profile test --workflow integration \
            --input /tmp/test_samplesheet.csv

  workflow_smoke_tests:
    name: Workflow smoke tests
    runs-on: ubuntu-latest
    needs: lint_and_validate
    strategy:
      fail-fast: false
      matrix:
        workflow: [ingest_export, ingest_tabulate, integration, nmf_vae, batch_effect_assessments]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Nextflow runtime
        uses: actions/cache@v4
        with:
          path: |
            ~/.nextflow
            ~/.gradle/caches
          key: nextflow-${{ runner.os }}-${{ hashFiles('main.nf', 'nextflow.config', 'configs/*.config', 'workflows/*.nf', 'modules/local/**/*.nf') }}
          restore-keys: |
            nextflow-${{ runner.os }}-

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow
          nextflow -version

      - name: Run workflow smoke test
        run: |
          if [[ "${{ matrix.workflow }}" == "integration" ]]; then
            bash scripts/ci/run_nextflow_smoke_tests.sh workflow integration --scmodal_use_cpu true
          else
            bash scripts/ci/run_nextflow_smoke_tests.sh workflow ${{ matrix.workflow }}
          fi

      - name: Upload workflow test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-${{ matrix.workflow }}-artifacts
          path: test-results/workflow/${{ matrix.workflow }}/

  module_smoke_tests:
    name: Module smoke tests
    runs-on: ubuntu-latest
    needs: lint_and_validate
    strategy:
      fail-fast: false
      matrix:
        module: [ingest_labkey, ingest_file, ingest_metadata, ingest_url, export_counts, gene_harmonize, scmodal_integrate, tabulate]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Nextflow runtime
        uses: actions/cache@v4
        with:
          path: |
            ~/.nextflow
            ~/.gradle/caches
          key: nextflow-${{ runner.os }}-${{ hashFiles('main.nf', 'nextflow.config', 'configs/*.config', 'workflows/*.nf', 'modules/local/**/*.nf') }}
          restore-keys: |
            nextflow-${{ runner.os }}-

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow
          nextflow -version

      - name: Run module smoke test
        run: bash scripts/ci/run_nextflow_smoke_tests.sh module ${{ matrix.module }}

      - name: Upload module test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-${{ matrix.module }}-artifacts
          path: test-results/module/${{ matrix.module }}/

  container_smoke:
    name: Optional container smoke test
    runs-on: ubuntu-latest
    needs: lint_and_validate
    if: github.event_name == 'workflow_dispatch' && inputs.run_container_smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore cached module images
        uses: actions/cache@v4
        with:
          path: .ci/docker-cache
          key: module-images-${{ runner.os }}-${{ hashFiles('scripts/ci/cache_container_images.sh', 'configs/base.config', 'modules/local/**/*.nf') }}
          restore-keys: |
            module-images-${{ runner.os }}-

      - name: Pull and cache module images
        run: bash scripts/ci/cache_container_images.sh

      - name: Smoke test rdiscvr image
        run: |
          docker run --rm ghcr.io/bimberlabinternal/rdiscvr:latest \
            Rscript -e "suppressPackageStartupMessages({library(Rdiscvr); library(Seurat)}); cat('rdiscvr ok\n')"

      - name: Smoke test cellmembrane image
        run: |
          docker run --rm ghcr.io/bimberlabinternal/cellmembrane:latest \
            Rscript -e "suppressPackageStartupMessages({library(Seurat); library(Matrix)}); cat('cellmembrane ok\n')"

      - name: Smoke test scmodal image
        run: |
          docker run --rm ghcr.io/gwmcelfresh/scmodal:latest \
            python3 -c "import scmodal, torch, scanpy, anndata; print('scmodal ok', torch.__version__)"

