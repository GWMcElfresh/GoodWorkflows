site_name: GoodWorkflows
site_description: DSL2 Nextflow pipeline for single-cell RNA-seq processing on SLURM + Podman HPC systems.
site_url: https://gwmcelfresh.github.io/GoodWorkflows/
repo_url: https://github.com/GWMcElfresh/GoodWorkflows
repo_name: GWMcElfresh/GoodWorkflows

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Workflows:
    - Integration Pipeline: workflows/integration-pipeline.md
    - Ingest + Export: workflows/ingest-export.md
    - Ingest + Tabulate: workflows/ingest-tabulate.md
  - Vignettes:
    - Synthetic Tabulation Walkthrough: vignettes/synthetic-tabulation.md
  - Data Formats: data-formats.md
  - Parameters: parameters.md
  - API Reference:
    - Overview: api/index.md
    - Inputs: api/generated/inputs.md
    - Configuration: api/config.md
    - Workflows: api/generated/workflows.md
    - Functions: api/generated/functions.md
