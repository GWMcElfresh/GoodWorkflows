# compose.yaml – Example 3-stage HPC pipeline
#
# Services:
#   1. preprocess  – reads raw data from /data/input, writes to /data/interim
#   2. model       – reads from /data/interim, writes results to /data/output
#   3. postprocess – reads /data/output, produces final report in /data/results
#
# All services share a single "data" volume so no external network is needed.
# The pipeline runs sequentially via depends_on + service_completed_successfully.
#
# Usage:
#   podman-compose up --abort-on-container-exit
# ---------------------------------------------------------------------------- #

services:

  # -------------------------------------------------------------------------- #
  # Stage 1 – Preprocessing
  # -------------------------------------------------------------------------- #
  preprocess:
    image: python:3.12-slim
    container_name: preprocess
    working_dir: /workspace
    volumes:
      - data:/data
      - ./workspace:/workspace:ro
    environment:
      - INPUT_DIR=/data/input
      - INTERIM_DIR=/data/interim
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    command: >
      python3 -c "
      import os, pathlib, json, time

      input_dir   = pathlib.Path(os.environ['INPUT_DIR'])
      interim_dir = pathlib.Path(os.environ['INTERIM_DIR'])
      interim_dir.mkdir(parents=True, exist_ok=True)

      print('[preprocess] Starting preprocessing stage')
      # Simulate reading raw files
      raw_files = list(input_dir.glob('*.txt')) if input_dir.exists() else []
      print(f'[preprocess] Found {len(raw_files)} raw file(s)')

      # Write a manifest so downstream stages know what was processed
      manifest = {'stage': 'preprocess', 'files': [str(f) for f in raw_files], 'count': len(raw_files)}
      (interim_dir / 'manifest.json').write_text(json.dumps(manifest, indent=2))
      print('[preprocess] Manifest written to', interim_dir / 'manifest.json')
      print('[preprocess] Done')
      "

  # -------------------------------------------------------------------------- #
  # Stage 2 – Model / Compute
  # -------------------------------------------------------------------------- #
  model:
    image: python:3.12-slim
    container_name: model
    working_dir: /workspace
    volumes:
      - data:/data
      - ./workspace:/workspace:ro
    environment:
      - INTERIM_DIR=/data/interim
      - OUTPUT_DIR=/data/output
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MODEL_PARAMS=${MODEL_PARAMS:-default}
    depends_on:
      preprocess:
        condition: service_completed_successfully
    command: >
      python3 -c "
      import os, pathlib, json, time

      interim_dir = pathlib.Path(os.environ['INTERIM_DIR'])
      output_dir  = pathlib.Path(os.environ['OUTPUT_DIR'])
      output_dir.mkdir(parents=True, exist_ok=True)

      print('[model] Starting model stage')
      manifest_path = interim_dir / 'manifest.json'
      if manifest_path.exists():
          manifest = json.loads(manifest_path.read_text())
          print(f'[model] Processing {manifest[\"count\"]} file(s) from preprocess stage')
      else:
          print('[model] No manifest found; running with empty input')
          manifest = {'count': 0}

      # Simulate computation
      result = {'stage': 'model', 'params': os.environ.get('MODEL_PARAMS', 'default'), 'input_count': manifest['count'], 'status': 'success'}
      (output_dir / 'result.json').write_text(json.dumps(result, indent=2))
      print('[model] Result written to', output_dir / 'result.json')
      print('[model] Done')
      "

  # -------------------------------------------------------------------------- #
  # Stage 3 – Postprocessing / Report
  # -------------------------------------------------------------------------- #
  postprocess:
    image: python:3.12-slim
    container_name: postprocess
    working_dir: /workspace
    volumes:
      - data:/data
      - ./workspace:/workspace:ro
    environment:
      - OUTPUT_DIR=/data/output
      - RESULTS_DIR=/data/results
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      model:
        condition: service_completed_successfully
    command: >
      python3 -c "
      import os, pathlib, json, datetime

      output_dir  = pathlib.Path(os.environ['OUTPUT_DIR'])
      results_dir = pathlib.Path(os.environ['RESULTS_DIR'])
      results_dir.mkdir(parents=True, exist_ok=True)

      print('[postprocess] Starting postprocessing stage')
      result_path = output_dir / 'result.json'
      if result_path.exists():
          result = json.loads(result_path.read_text())
          print(f'[postprocess] Model result: {result}')
      else:
          print('[postprocess] No result.json found; generating empty report')
          result = {}

      report = {
          'generated_at': datetime.datetime.utcnow().isoformat() + 'Z',
          'pipeline_status': 'complete',
          'stages': ['preprocess', 'model', 'postprocess'],
          'model_result': result,
      }
      (results_dir / 'report.json').write_text(json.dumps(report, indent=2))
      print('[postprocess] Report written to', results_dir / 'report.json')
      print('[postprocess] Pipeline complete')
      "

# ---------------------------------------------------------------------------- #
# Shared volume – no network I/O required
# ---------------------------------------------------------------------------- #
volumes:
  data:
    driver: local
